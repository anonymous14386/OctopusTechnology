<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Tracker</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/money-tracker.css">
</head>
<body>
    <div class="content-container">
        <h1>Money Tracker</h1>

        <div id="auth-section">
            <div id="register-form">
                <h2>Register</h2>
                <input type="text" id="register-username" placeholder="Username">
                <input type="password" id="register-password" placeholder="Password">
                <button id="register-button">Register</button>
                <p id="register-message"></p>
                <p>Already have an account? <a href="#" id="show-login">Login here</a></p>
            </div>

            <div id="login-form" style="display: none;">
                <h2>Login</h2>
                <input type="text" id="login-username" placeholder="Username">
                <input type="password" id="login-password" placeholder="Password">
                <button id="login-button">Login</button>
                <p id="login-message"></p>
                <p>Don't have an account? <a href="#" id="show-register">Register here</a></p>
            </div>
        </div>

        <div id="money-tracker-dashboard" style="display: none;">
            <h2>Welcome, <span id="dashboard-username"></span>!</h2>
            <button id="logout-button">Logout</button>

            <section id="summary">
                <h3>Financial Summary</h3>
                <p>Estimated Bi-Weekly Pay: $<span id="estimated-biweekly-pay">1200.00</span></p>
                <p>Monthly Pay After Expenses: $<span id="monthly-pay-after-expenses">0.00</span></p>
            </section>

            <section id="pay-periods">
                <h3>Pay Periods</h3>
                <form id="add-pay-period-form">
                    <input type="number" id="pay-period-amount" placeholder="Amount" step="0.01" required>
                    <select id="pay-period-frequency" required>
                        <option value="">Select Frequency</option>
                        <option value="weekly">Weekly</option>
                        <option value="biweekly">Bi-Weekly</option>
                        <option value="monthly">Monthly</option>
                    </select>
                    <input type="date" id="pay-period-start-date" required>
                    <input type="date" id="pay-period-end-date" required>
                    <button type="submit">Add Pay Period</button>
                </form>
                <div id="pay-periods-list"></div>
            </section>

            <section id="expenses">
                <h3>Monthly Expenses/Subscriptions</h3>
                <form id="add-expense-form">
                    <input type="text" id="expense-name" placeholder="Expense Name" required>
                    <input type="number" id="expense-amount" placeholder="Amount" step="0.01" required>
                    <select id="expense-frequency" required>
                        <option value="">Select Frequency</option>
                        <option value="monthly">Monthly</option>
                        <option value="yearly">Yearly</option>
                    </select>
                    <input type="number" id="expense-due-date" placeholder="Due Day (1-31)" min="1" max="31">
                    <button type="submit">Add Expense</button>
                </form>
                <div id="expenses-list"></div>
            </section>

            <section id="accounts">
                <h3>Accounts</h3>
                <form id="add-account-form">
                    <input type="text" id="account-name" placeholder="Account Name (e.g., Checking, Savings)" required>
                    <input type="number" id="account-balance" placeholder="Current Balance" step="0.01" required>
                    <button type="submit">Add Account</button>
                </form>
                <div id="accounts-list"></div>
            </section>

            <section id="debts">
                <h3>Debts</h3>
                <form id="add-debt-form">
                    <input type="text" id="debt-name" placeholder="Debt Name (e.g., Milestone, Capital One Savor)" required>
                    <input type="number" id="debt-amount-owed" placeholder="Amount Owed" step="0.01" required>
                    <input type="number" id="debt-min-payment" placeholder="Minimum Payment (Optional)" step="0.01">
                    <button type="submit">Add Debt</button>
                </form>
                <div id="debts-list"></div>
            </section>
        </div>
    </div>
    <script src="scripts/money-tracker.js"></script>
</body>
</html>
